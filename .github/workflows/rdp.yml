name: Sidali Free RDP
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/b3Ut3qqAI67/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip
        ./ngrok/ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        net user runneradmin Sidali2026!
    - name: Start Ngrok Tunnel
      run: |
        Start-Process ./ngrok/ngrok.exe -ArgumentList "tcp 3389"
        echo "===================================================="
        echo "RDP واجد درك يا سيد علي!"
        echo "المودباس هو: Sidali2026!"
        echo "===================================================="
        start-sleep -Seconds 21600
